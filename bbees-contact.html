<!DOCTYPE html>
<html lang="en" id="top">
<!--bbees using Oakwood Framework v4.1.0 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Award-winning honey by Bavington Bees. Contact us for honey and bee-related products.">
    <title>Contact Bavington Bees</title>
    <link rel="stylesheet" href="/css/1-settings.css">
    <link rel="stylesheet" href="/css/2-base.css">
    <link rel="stylesheet" href="/css/3-components.css">
    <link rel="stylesheet" href="/css/4-utilities.css">
    <link rel="stylesheet" href="/css/5-custom.css">
</head>
<body>

<!-- Top bar (if needed) -->

<!-- Header -->
<header class="site-header u-mb-sm">
    <div class="header-left">
        <img src="/assets/images/logo.webp" alt="Bavington Bees logo" width="200" height="100">
    </div>
    <div class="header-center">
        <img src="/assets/images/strapline.webp" alt="Award Winning Honey" width="250">
    </div>
    <div class="header-right">
        <a href="https://www.instagram.com/bavington.bees/" target="_blank" rel="noopener" aria-label="Visit Bavington Bees on Instagram">
            <img src="assets/images/instagram-icon.svg" alt="" width="50" height="50">
        </a>
    </div>
</header>

<!-- Navigation -->
<nav class="top-nav u-mt-md" aria-label="Main navigation">
    <a href="/index.html">Home</a>
    <a href="/bbees-contact.html" aria-current="page">Contact</a>
</nav>

<!-- Hero image -->
<div class="hero-container">
    <div class="hero-image">
        <img src="/assets/images/hero.webp"
             alt="Bavington Bees Honey Bees"
             loading="eager"
             fetchpriority="high">
    </div>
</div>

<!-- Contact form -->
<main>

    <div class="container-contact u-mt-lg u-mb-section">
        <div id="contact" class="contact-item">

            <h1>Contact</h1>
            <form
            action="https://submit-form.com/I8k6ubkcd"
            method="POST"
            >

                <label for="name" class="form-label form-label--required u-mt-lg u-mb-xs">Name</label>
                <input class="form-control form-control--large"type="text" id="name" name="name" placeholder="Name" autocomplete="name" required>

                <label for="email" class="form-label form-label--required u-mt-lg u-mb-xs">Email</label>
                <input class="form-control form-control--large" type="email" id="email" name="_replyto" placeholder="Email" autocomplete="email" required>

                <label for="phone" class="form-label form-label--required u-mt-lg u-mb-xs">Phone</label>
                <input class="form-control form-control--medium" type="tel" id="phone" name="phone" placeholder="Telephone number" autocomplete="tel" required>

                <label for="callback" class="form-label form-label--required u-mt-lg u-mb-xs">Contact preference</label>
                <input class="form-control form-control--medium" type="text" id="callback" name="callback" placeholder="Phone, Email, Text Msg..." required>

                <label for="message" class="form-label form-label--required u-mt-lg u-mb-xs">Message</label>
                <textarea class="form-control" id="message" name="message" placeholder="How can I help you?" required></textarea>

                <!-- Redirect after successful submission -->
                <input type="hidden" name="_redirect" value="https://bavingtonbees.com/bbees-contact-success.html">
                <input type="hidden" name="_error" value="https://bavingtonbees.com/bbees-contact-error.html">
                <input type="hidden" name="_no-capture" value="true">

                <p class="red-asterisk">Required</p>

                <div class="cf-turnstile u-mt-lg"
                     data-sitekey="0x4AAAAAABBXbZZ1UUA0JRhW"
                     data-appearance="always">
                </div>

                <button type="submit" id="submit-button" class="button button--submit button--medium u-mt-lg u-mb-lg" >Send</button>

            </form>
        </div>
    </div>

</main>

<!-- FAB back to top -->
<a class="fab fab--bottom-right fab--pill" href="#top" aria-label="Back to top">↑</a>

<!-- Footer (web component) -->
<div class= "u-mt-section">
    <footer-site>Bavington Bees Ref: no-js</footer-site>
</div>

<!-- Scripts -->
<script src="/js/bbees-main.js"></script>

</body>
</html>
